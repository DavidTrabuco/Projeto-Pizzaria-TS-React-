<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pizza base (full circle) -->
  <circle cx="50" cy="50" r="48" fill="#F5A623" stroke="#C8791A" stroke-width="2"/>

  <!-- Crust border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4A055" stroke-width="8"/>

  <!-- Tomato sauce (inner circle) -->
  <circle cx="50" cy="50" r="40" fill="#E8452A"/>

  <!-- Cheese layer -->
  <circle cx="50" cy="50" r="38" fill="#F9D96A" opacity="0.85"/>

  <!-- Pepperoni slices -->
  <circle cx="50" cy="28" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="50" cy="28" r="2" fill="#8B0000" opacity="0.5"/>

  <circle cx="33" cy="38" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="33" cy="38" r="2" fill="#8B0000" opacity="0.5"/>

  <circle cx="67" cy="38" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="67" cy="38" r="2" fill="#8B0000" opacity="0.5"/>

  <circle cx="40" cy="57" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="40" cy="57" r="2" fill="#8B0000" opacity="0.5"/>

  <circle cx="60" cy="57" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="60" cy="57" r="2" fill="#8B0000" opacity="0.5"/>

  <circle cx="50" cy="70" r="6" fill="#B22222" stroke="#8B0000" stroke-width="0.8"/>
  <circle cx="50" cy="70" r="2" fill="#8B0000" opacity="0.5"/>

  <!-- Oregano dots (small green herbs) -->
  <circle cx="44" cy="35" r="2" fill="#4A7C59"/>
  <circle cx="58" cy="48" r="2" fill="#4A7C59"/>
  <circle cx="35" cy="55" r="2" fill="#4A7C59"/>
  <circle cx="65" cy="65" r="2" fill="#4A7C59"/>
  <circle cx="50" cy="45" r="2" fill="#4A7C59"/>

  <!-- Slice lines -->
  <line x1="50" y1="2" x2="50" y2="98" stroke="#C8791A" stroke-width="1.2" opacity="0.4"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#C8791A" stroke-width="1.2" opacity="0.4"/>
  <line x1="15" y1="15" x2="85" y2="85" stroke="#C8791A" stroke-width="1.2" opacity="0.4"/>
  <line x1="85" y1="15" x2="15" y2="85" stroke="#C8791A" stroke-width="1.2" opacity="0.4"/>
</svg>
