server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Esta é A LINHA MÁGICA: se não achar o arquivo, devolve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bonus: cache de arquivos estáticos pra performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}